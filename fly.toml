# fly.toml — Chart-Fights Python backend (FastAPI + native WebSockets)
#
# CHANGE ME: pick your own unique app name and preferred region before deploying.
#   - `app`             must be globally unique on Fly.io
#   - `primary_region`  pick the region closest to your players (see `fly platform regions`)
app = "chart-fights-backend"
primary_region = "iad"

# Build from the existing backend Dockerfile. The build context is this file's
# directory (the repo ROOT), so the Dockerfile's `COPY backend/ ...` and
# `COPY data/ ...` steps resolve correctly and the 1,710 parquet arenas ship
# inside the image. Run `fly deploy` from the repo root.
[build]
  dockerfile = "backend/Dockerfile"

# The container listens on 8080 (see backend/Dockerfile: ENV PORT=8080 and the
# uvicorn CMD). Fly injects PORT here too, kept in sync for clarity.
[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true

  # --- Single always-on instance (REQUIRED) -------------------------------
  # Match state (MATCHES / CONNECTIONS / ACTION_LOGS) lives in-memory in a
  # single process. Scaling to >1 machine would split players across machines
  # and break rooms; stopping the machine would drop live matches. So:
  #   * auto_stop_machines  = "off"  -> never auto-suspend/stop the room server
  #   * auto_start_machines = false  -> no cold-start races for an always-on app
  #   * min_machines_running = 1     -> keep exactly one machine warm
  # Also keep the app to ONE machine total (don't `fly scale count >1`).
  auto_stop_machines = "off"
  auto_start_machines = false
  min_machines_running = 1

  # Native WebSockets are plain HTTP upgrades, so the default http handler is
  # fine — no special concurrency tuning needed for a 1v1 room server.
  [http_service.concurrency]
    type = "connections"
    hard_limit = 200
    soft_limit = 150

  # Health check hits the FastAPI /health endpoint.
  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "get"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  # pandas + pyarrow + holding arena bars in memory; 1GB is comfortable.
  memory = "1gb"
  cpus = 1
